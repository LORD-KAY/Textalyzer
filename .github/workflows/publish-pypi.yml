name: Publish Python distribution to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to publish
        required: true
        default: v0.2.0
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install .

      - name: Run tests
        run: python -m unittest discover -s test -p "test*.py" -v

  build:
    name: Build distribution
    needs:
      - test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/textalyzer
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
